[tool.ruff]
line-length = 100
target-version = "py311"
# .gitignore in this repo is "*" (catch-all); make sure ruff still scans the source.
respect-gitignore = false
extend-exclude = [
    "migrations",
    "frontend",
    ".venv",
    "venv",
    "env",
    "build",
    "dist",
    "node_modules",
    "__pycache__",
]

[tool.ruff.lint]
select = ["E", "F", "W", "I", "B", "UP", "SIM", "RUF"]
ignore = [
    # B008: function call in argument defaults is common in Flask (e.g. Depends-style patterns)
    "B008",
    # SIM108: ternary suggestions can hurt readability
    "SIM108",
    # RUF012: mutable class attrs are common in SQLAlchemy/WTForms classes
    "RUF012",
]

[tool.ruff.lint.per-file-ignores]
# Long lines and unused imports are common/acceptable in tests and migrations
"tests/**" = ["E501", "F401", "F811", "F841", "B011", "B017", "RUF059"]
"migrations/**" = ["E501", "F401", "E402"]
"scripts/**" = ["E501", "RUF059", "F841", "SIM113"]
"**/__init__.py" = ["F401", "E402"]
# Existing app/ code predates this lint config; tighten in follow-up PRs.
"app/**" = [
    "E501", "E402", "F841", "RUF059", "SIM113", "RUF100",
    "SIM103", "SIM105", "SIM117",
]

[tool.ruff.lint.isort]
known-first-party = ["app", "main", "config", "run"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-q --tb=short"
